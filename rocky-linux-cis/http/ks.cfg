#version=RHEL9
# ─── Mode d'installation ──────────────────────────────────────────────────────
text
reboot

# ─── Source ───────────────────────────────────────────────────────────────────
cdrom

# ─── Clavier / langue / timezone ──────────────────────────────────────────────
keyboard --vckeymap=fr --xlayouts='fr'
lang fr_FR.UTF-8
timezone Europe/Paris --utc

# ─── Réseau (statique) ────────────────────────────────────────────────────────
network --bootproto=static --device=link --ip=192.168.1.110 --netmask=255.255.255.0 --gateway=192.168.1.254 --nameserver=8.8.8.8,8.8.4.4 --hostname=gold-rocky9 --onboot=yes --activate

# ─── Sécurité ─────────────────────────────────────────────────────────────────
selinux --enforcing
firewall --enabled --service=ssh

# ─── Utilisateur deploy ───────────────────────────────────────────────────────
# Le mot de passe "deploy" est hashé en sha512 ci-dessous.
# Généré avec : python3 -c "import crypt,getpass; print(crypt.crypt('deploy', crypt.mksalt(crypt.METHOD_SHA512)))"
rootpw --lock
user --name=deploy --password=$6$ZOZLzaCzv/2YuAT5$tx3GC0RVZ.sY.yOoR16WfGyoR/ATcKzLQHZjmP./330PXUIYbUlHfy6VWz.AZAhrgNr138oG0NPm4LWJMUVR21 --iscrypted --groups=wheel

# ─── Disque & partitionnement CIS Level 2 ─────────────────────────────────────
ignoredisk --only-use=sda
clearpart --all --initlabel --drives=sda
bootloader --location=mbr --boot-drive=sda --append="audit=1 audit_backlog_limit=8192"

# Table de partition (BIOS + GPT)
part biosboot  --fstype=biosboot --ondisk=sda --size=1
part /boot     --fstype=xfs     --ondisk=sda --size=1024
part pv.01     --fstype=lvmpv   --ondisk=sda --size=1    --grow

volgroup vg_system pv.01

# ── Volumes logiques (CIS L2) ────────────────────────────────────────────────
logvol /              --fstype=xfs  --vgname=vg_system --name=lv_root    --size=10240
logvol /tmp           --fstype=xfs  --vgname=vg_system --name=lv_tmp     --size=2048  --fsoptions="nodev,nosuid,noexec"
logvol /var           --fstype=xfs  --vgname=vg_system --name=lv_var     --size=8192
logvol /var/log       --fstype=xfs  --vgname=vg_system --name=lv_varlog  --size=4096  --fsoptions="nodev,nosuid,noexec"
logvol /var/log/audit --fstype=xfs  --vgname=vg_system --name=lv_audit   --size=4096  --fsoptions="nodev,nosuid,noexec"
logvol /var/tmp       --fstype=xfs  --vgname=vg_system --name=lv_vartmp  --size=2048  --fsoptions="nodev,nosuid,noexec"
logvol /home          --fstype=xfs  --vgname=vg_system --name=lv_home    --size=1     --grow --fsoptions="nodev,nosuid"
logvol swap           --fstype=swap --vgname=vg_system --name=lv_swap    --size=2048

# ─── Paquets ──────────────────────────────────────────────────────────────────
%packages --ignoremissing
@core
openssh-server
sudo
python3
qemu-guest-agent
-telnet
-rsh
-rsh-server
-talk
-talk-server
-tftp
-tftp-server
-xinetd
-ypbind
-ypserv
%end

# ─── Post-installation ────────────────────────────────────────────────────────
%post --log=/root/ks-post.log

# Autoriser deploy à utiliser sudo sans mot de passe (pour le provisionnement Packer)
echo "deploy ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/deploy
chmod 0440 /etc/sudoers.d/deploy

# Préparer le répertoire SSH pour deploy (la clé sera copiée par Packer)
mkdir -p /home/deploy/.ssh
chmod 700 /home/deploy/.ssh
chown deploy:deploy /home/deploy/.ssh

# Activer qemu-guest-agent
systemctl enable qemu-guest-agent

# Autoriser temporairement le mot de passe SSH pour que Packer puisse se connecter.
# Le provisioner 02-cis-hardening.sh le désactivera après avoir déposé la clé SSH.
echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/01-packer-temp.conf

# Politique de mot de passe renforcée (CIS)
sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   365/' /etc/login.defs
sed -i 's/^PASS_MIN_DAYS.*/PASS_MIN_DAYS   7/'   /etc/login.defs
sed -i 's/^PASS_MIN_LEN.*/PASS_MIN_LEN    14/'   /etc/login.defs
sed -i 's/^PASS_WARN_AGE.*/PASS_WARN_AGE   7/'   /etc/login.defs

%end
